{% extends "base.html" %}

{% block title %}Map — {{ profile.name }}{% endblock %}

{% block content %}
<section class="page-hero" aria-labelledby="map-heading">
    <div class="section-inner">
        <p class="section-index">Journey</p>
        <h1 id="map-heading">Places on the Map</h1>
        <p class="section-summary">From {{ profile.origin }} to the places I have lived, studied, and worked.</p>
    </div>
</section>
<section class="section" style="padding-top: 0;" aria-label="Interactive map">
    <div class="section-inner">
        <div id="map-root" class="map-root"></div>
    </div>
    <script id="map-payload" type="application/json">{{ map_payload | tojson }}</script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='js/map-renderer.js') }}" defer></script>
</section>
{% endblock %}
