<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ profile.name }} — {{ profile.role }} focused on {{ profile.focus }}.">
    <meta name="theme-color" content="#0a0b0e">
    <meta property="og:title" content="{{ profile.name }} — {{ profile.role }}">
    <meta property="og:description" content="{{ profile.tagline }}">
    <meta property="og:url" content="{{ url or request.url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.svg') }}" type="image/svg+xml">
    <title>{% block title %}{{ profile.name }} — Portfolio{% endblock %}</title>
    <script>document.documentElement.classList.add("js");</script>
</head>
<body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header" id="site-header">
        <div class="header-inner">
            <a href="/" class="brand" aria-label="Home">
                <span class="brand-mark" aria-hidden="true"></span>
                <span class="brand-name">{{ profile.nav_name or profile.name }}</span>
            </a>
            <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav" aria-label="Toggle navigation">
                <span class="nav-toggle-bar"></span>
                <span class="nav-toggle-bar"></span>
            </button>
            <nav class="primary-nav" id="primary-nav" aria-label="Main navigation">
                {% for item in nav_items %}
                <a href="{{ item.route }}" class="nav-link{% if request.path != '/' and request.path == item.route %} active{% endif %}" {% if '#' in item.route %}data-section="{{ item.route.split('#')[1] }}"{% endif %}>
                    {{ item.label }}
                </a>
                {% endfor %}
            </nav>
        </div>
    </header>

    <main id="main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p class="footer-name">{{ profile.name }}</p>
            <p class="footer-meta">Engineered with precision. Built with Flask.</p>
            <div class="footer-links">
                {% if profile.github %}<a href="{{ profile.github }}" rel="noopener">GitHub</a>{% endif %}
                {% if profile.email %}<a href="mailto:{{ profile.email }}">Email</a>{% endif %}
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/site.js') }}" defer></script>
</body>
</html>
