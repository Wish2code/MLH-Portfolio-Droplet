<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Timeline</title>
</head>

<body>

<h1>Timeline</h1>

<form id="timeline-form">

    <input
        id="name"
        type="text"
        placeholder="Name"
        required>

    <br><br>

    <input
        id="email"
        type="email"
        placeholder="Email"
        required>

    <br><br>

    <textarea
        id="content"
        placeholder="Write something..."
        required></textarea>

    <br><br>

    <button type="submit">
        Submit
    </button>

</form>

<hr>

<div id="timeline-posts">

</div>

<script src="{{ url_for('static', filename='timeline.js') }}"></script>

</body>
</html>
